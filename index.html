    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .option-grid {
            display: grid;
            gap: 15px;
        }
        
        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 16px;
            color: #495057;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .option-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .option-btn .title {
            font-weight: 600;
            font-size: 16px;
        }
        
        .option-btn .subtitle-text {
            font-size: 13px;
            opacity: 0.8;
            color: #6c757d;
        }
        
        .option-btn:hover .subtitle-text {
            color: rgba(255,255,255,0.9);
        }
        
        .breadcrumb {
            text-align: center;
            color: #6c757d;
            margin-bottom: 20px;
            font-size: 14px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .video-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
        }
        
        video {
            width: 100%;
            display: block;
        }
        
        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            width: 100%;
        }
        
        .back-btn:hover {
            background: #5a6268;
        }
        
        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        /* 分隔标题样式 */
        .section-divider {
            margin: 25px 0 15px 0;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            text-align: center;
            grid-column: 1 / -1;
        }
        
        .section-divider .divider-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .section-divider .divider-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>

        let currentLang = '';
        let currentLangName = '';

        // 选择语言
        function selectLang(lang, name) {
            currentLang = lang;
            currentLangName = name;
            
            // 生成视频选择按钮
            const videoGrid = document.getElementById('videoGrid');
            videoGrid.innerHTML = '';
            
            config[lang].videos.forEach(video => {
                if (video.type === 'section') {
                    // 渲染为分隔标题
                    const divider = document.createElement('div');
                    divider.className = 'section-divider';
                    divider.innerHTML = `
                        <div class="divider-title">${video.title}</div>
                        <div class="divider-subtitle">${video.subtitle}</div>
                    `;
                    videoGrid.appendChild(divider);
                } else {
                    // 渲染为视频按钮
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = `
                        <span class="title">${video.title}</span>
                        <span class="subtitle-text">${video.subtitle}</span>
                    `;
                    btn.onclick = () => playVideo(video);
                    videoGrid.appendChild(btn);
                }
            });
            
            document.getElementById('breadcrumb2').textContent = `当前语言：${name}`;
            showStep(2);
        }

        // 播放视频
        function playVideo(video) {
            // 拼接完整 URL
            const videoUrl = config.baseUrl + encodeURIComponent(video.file);
            
            const videoPlayer = document.getElementById('videoPlayer');
            const videoSource = document.getElementById('videoSource');
            
            videoSource.src = videoUrl;
            videoPlayer.load();
            
            // 更新标题
            document.getElementById('videoTitle').textContent = `▶️ ${video.title}`;
            document.getElementById('breadcrumb3').textContent = 
                `${currentLangName} > ${video.title}`;
            showStep(3);
        }

        // 切换步骤
        function showStep(stepNum) {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById(`step${stepNum}`).classList.add('active');
        }

        // 返回上一步
        function goBack(targetStep) {
            const videoPlayer = document.getElementById('videoPlayer');
            videoPlayer.pause();
            showStep(targetStep);
        }

        // 页面加载时检查 URL 参数（支持直接链接到特定视频）
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang');
            const videoId = params.get('video');
            
            if (lang && videoId && config[lang]) {
                const video = config[lang].videos.find(v => v.id === videoId);
                if (video) {
                    selectLang(lang, config[lang].name);
                    setTimeout(() => playVideo(video), 100);
                }
            }
        };
