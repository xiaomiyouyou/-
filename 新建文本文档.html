<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能仓储视频中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
        }
        
        .container {
            background: white;
            width: 100%;
            height: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 头部标题区 - 固定高度 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .header .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }
        
        /* 面包屑导航 */
        .breadcrumb {
            background: #f8f9fa;
            padding: 10px 15px;
            font-size: 12px;
            color: #6c757d;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 内容区 - 可滚动 */
        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 15px;
        }
        
        /* 步骤容器 */
        .step {
            display: none;
            height: 100%;
        }
        
        .step.active {
            display: block;
        }
        
        /* 语言选择 - 大按钮适合拇指点击 */
        .lang-grid {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }
        
        .lang-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .lang-btn:active {
            transform: scale(0.98);
        }
        
        .lang-btn .flag {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        
        .lang-btn .title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        
        .lang-btn .subtitle {
            font-size: 14px;
            color: #6c757d;
        }
        
        .lang-btn.selected, .lang-btn:hover {
            background: #667eea;
            border-color: #667eea;
        }
        
        .lang-btn.selected .title, .lang-btn:hover .title {
            color: white;
        }
        
        .lang-btn.selected .subtitle, .lang-btn:hover .subtitle {
            color: rgba(255,255,255,0.8);
        }
        
        /* 视频列表 - 垂直排列 */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .video-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .video-item:active {
            background: #667eea;
            border-color: #667eea;
            transform: scale(0.99);
        }
        
        .video-item:active .video-title,
        .video-item:active .video-subtitle {
            color: white;
        }
        
        .video-item .video-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            line-height: 1.4;
        }
        
        .video-item .video-subtitle {
            font-size: 13px;
            color: #6c757d;
            line-height: 1.3;
        }
        
        /* 视频播放区 - 全屏适配 */
        .video-player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        
        .video-player-container.active {
            display: flex;
        }
        
        .video-header {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }
        
        .video-header .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
        
        .video-header .video-info {
            flex: 1;
            overflow: hidden;
        }
        
        .video-header .video-info-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .video-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        
        video {
            width: 100%;
            height: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        /* 底部操作区 */
        .video-controls {
            background: rgba(0,0,0,0.8);
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .control-btn {
            flex: 1;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .control-btn.secondary {
            background: rgba(255,255,255,0.2);
        }
        
        /* 分类标题 */
        .section-header {
            margin: 20px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .section-header h2 {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }
        
        /* 提示信息 */
        .tip {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0;
            font-size: 13px;
            color: #856404;
        }
    </style>

        let currentLang = '';
        let currentLangName = '';

        // 选择语言
        function selectLang(lang, name) {
            currentLang = lang;
            currentLangName = name;
            
            // 更新面包屑
            document.getElementById('breadcrumb').textContent = 
                `当前语言：${name} / Current: ${name}`;
            
            // 生成视频列表（按分类）
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = '';
            
            const langData = config[lang];
            langData.sections.forEach(section => {
                // 分类标题
                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'section-header';
                sectionHeader.innerHTML = `<h2>${section.title}</h2>`;
                videoList.appendChild(sectionHeader);
                
                // 视频项
                section.videos.forEach(video => {
                    const item = document.createElement('div');
                    item.className = 'video-item';
                    item.innerHTML = `
                        <div class="video-title">${video.title}</div>
                        <div class="video-subtitle">${video.subtitle}</div>
                    `;
                    item.onclick = () => playVideo(video);
                    videoList.appendChild(item);
                });
            });
            
            showStep(2);
        }

        // 播放视频
        function playVideo(video) {
            const videoUrl = config.baseUrl + encodeURIComponent(video.file);
            
            const videoPlayer = document.getElementById('videoPlayer');
            const videoSource = document.getElementById('videoSource');
            const videoContainer = document.getElementById('videoPlayerContainer');
            
            videoSource.src = videoUrl;
            videoPlayer.load();
            
            document.getElementById('videoPlayerTitle').textContent = video.title;
            videoContainer.classList.add('active');
            
            // 尝试自动播放（部分浏览器可能阻止）
            videoPlayer.play().catch(e => {
                console.log('Auto-play prevented:', e);
            });
        }

        // 关闭视频
        function closeVideo() {
            const videoPlayer = document.getElementById('videoPlayer');
            const videoContainer = document.getElementById('videoPlayerContainer');
            
            videoPlayer.pause();
            videoContainer.classList.remove('active');
        }

        // 切换全屏
        function toggleFullscreen() {
            const videoPlayer = document.getElementById('videoPlayer');
            
            if (videoPlayer.requestFullscreen) {
                videoPlayer.requestFullscreen();
            } else if (videoPlayer.webkitRequestFullscreen) {
                videoPlayer.webkitRequestFullscreen();
            } else if (videoPlayer.msRequestFullscreen) {
                videoPlayer.msRequestFullscreen();
            }
        }

        // 切换步骤
        function showStep(stepNum) {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById(`step${stepNum}`).classList.add('active');
        }

        // 页面加载检查参数
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang');
            const videoId = params.get('video');
            
            if (lang && videoId && config[lang]) {
                // 查找视频
                let targetVideo = null;
                config[lang].sections.forEach(section => {
                    const video = section.videos.find(v => v.id === videoId);
                    if (video) targetVideo = video;
                });
                
                if (targetVideo) {
                    selectLang(lang, config[lang].name);
                    setTimeout(() => playVideo(targetVideo), 100);
                }
            }
        };

        // 监听返回键（Android）
        document.addEventListener('backbutton', function(e) {
            const videoContainer = document.getElementById('videoPlayerContainer');
            if (videoContainer.classList.contains('active')) {
                e.preventDefault();
                closeVideo();
            }
        }, false);
